<!DOCTYPE html>
<html lang="en">
  <head>
    <script>
      (function() {
        try {
          var originalFetch = window.fetch;
          if (originalFetch) {
            var currentFetch = originalFetch;
            Object.defineProperty(window, 'fetch', {
              get: function() {
                return currentFetch;
              },
              set: function(val) {
                currentFetch = val;
              },
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {
          console.warn('Failed to decorate window.fetch:', e);
        }
      })();
    </script>
